<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒲东中心校初中部 表白墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ffe6ef 0%, #ffd0de 100%);
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        h1 {
            color: #c53a5f;
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #e66a7e;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 2px solid #ffe0e6;
            border-radius: 24px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #e66a7e;
        }
        button {
            background: linear-gradient(135deg, #e66a7e 0%, #c53a5f 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        .message-item {
            background: #fff9fb;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
            border-left: 5px solid #e66a7e;
        }
        .target {
            color: #c53a5f;
            font-weight: bold;
            font-size: 18px;
        }
        .content {
            margin: 12px 0;
            line-height: 1.5;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }
        .like-btn {
            background: #f0f0f0;
            color: #c53a5f;
            padding: 6px 14px;
            font-size: 14px;
            margin-top: 8px;
            margin-right: 8px;
        }
        .admin-btn {
            background: #ffaa00;
            color: #333;
        }
        .comment-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #ffe0e6;
        }
        .comment {
            background: #fff0f3;
            border-radius: 16px;
            padding: 10px;
            margin-top: 8px;
            font-size: 14px;
        }
        .comment-name {
            font-weight: bold;
            color: #c53a5f;
        }
        .hidden {
            display: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #c53a5f;
        }
        .admin-panel {
            background: #fff0e6;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💖 蒲东中心校初中部 表白墙</h1>
    <div class="sub">💌 勇敢说出你的心意</div>
    
    <div class="card">
        <h3>📝 发布表白</h3>
        <input type="text" id="target" placeholder="表白对象，例如：九年级三班 李明">
        <textarea id="content" rows="3" placeholder="写下你的真心话..."></textarea>
        <input type="text" id="name" placeholder="署名（留空则匿名）">
        <button onclick="publish()">✨ 发布表白</button>
    </div>
    
    <div id="adminPanel" class="admin-panel hidden">
        <h3>🔐 管理员模式</h3>
        <input type="password" id="adminPwd" placeholder="管理员密码">
        <button onclick="enableAdmin()">进入管理</button>
        <button onclick="disableAdmin()">退出</button>
    </div>
    
    <div class="card">
        <h3>❤️ 表白墙列表</h3>
        <div id="list">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<script>
    // 数据存储地址
    const DATA_URL = 'https://raw.githubusercontent.com/delinyu230131/lovewall-date/main/data.json';
    let messages = [];
    let isAdmin = false;
    
    async function load() {
        try {
            const res = await fetch(DATA_URL);
            messages = await res.json();
            show();
        } catch (err) {
            document.getElementById('list').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
        }
    }
    
    function formatTime(t) {
        const d = new Date(t);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function show() {
        const list = document.getElementById('list');
        if (messages.length === 0) {
            list.innerHTML = '<div class="loading">💔 暂无表白，快来发第一条吧～</div>';
            return;
        }
        let html = '';
        for (let i = messages.length-1; i >= 0; i--) {
            const m = messages[i];
            const nameShow = m.name ? m.name : '匿名的心';
            html += `<div class="message-item">
                <div class="target">🎀 致 ${escapeHtml(m.target)}</div>
                <div class="content">${escapeHtml(m.content)}</div>
                <div class="meta">
                    <span>✍️ ${escapeHtml(nameShow)}</span>
                    <span>${formatTime(m.time)}</span>
                </div>
                <div>
                    <button class="like-btn" onclick="addLike(${i})">❤️ 点赞 ${m.likes || 0}</button>
                    <button class="like-btn" onclick="showCommentForm(${i})">💬 评论 (${m.comments?.length || 0})</button>
                    ${isAdmin ? `<button class="like-btn admin-btn" onclick="deleteMessage(${i})">🗑️ 删除</button>` : ''}
                </div>
                <div id="comment-form-${i}" class="hidden" style="margin-top: 10px;">
                    <input type="text" id="comment-name-${i}" placeholder="你的名字（可选）" style="font-size:13px;">
                    <input type="text" id="comment-content-${i}" placeholder="写评论...">
                    <button onclick="addComment(${i})" style="font-size:12px; padding:8px;">提交评论</button>
                </div>`;
            
            if (m.comments && m.comments.length > 0) {
                html += `<div class="comment-section">`;
                for (let c of m.comments) {
                    html += `<div class="comment">
                        <span class="comment-name">${escapeHtml(c.name)}</span>：${escapeHtml(c.content)}
                        <span class="comment-time"> ${formatTime(c.time)}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        list.innerHTML = html;
    }
    
    function showCommentForm(index) {
        const form = document.getElementById(`comment-form-${index}`);
        if (form) form.classList.toggle('hidden');
    }
    
    function publish() {
        alert('💡 发布功能需要配合后端。目前数据存储在 GitHub，你可以直接编辑 data.json 文件来添加表白。\n\n管理员密码: admin123');
    }
    
    function addLike(index) {
        alert('💡 点赞功能需要后端支持。你可以直接修改 GitHub 上的 data.json 文件来更新点赞数。');
    }
    
    function addComment(index) {
        alert('💡 评论功能需要后端支持。你可以直接修改 GitHub 上的 data.json 文件来添加评论。');
    }
    
    function deleteMessage(index) {
        alert('💡 删除功能：在 GitHub 仓库 lovewall-date 中，直接编辑 data.json 文件删除对应条目即可。');
    }
    
    function enableAdmin() {
        const pwd = document.getElementById('adminPwd').value;
        if (pwd === 'admin123') {
            isAdmin = true;
            alert('管理员模式已开启，删除按钮已显示');
            document.getElementById('adminPanel').classList.add('hidden');
            show();
        } else {
            alert('密码错误');
        }
    }
    
    function disableAdmin() {
        isAdmin = false;
        alert('已退出管理员模式');
        show();
    }
    
    load();
</script>
</body>
</html>
